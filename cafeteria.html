<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafeteria fictisia</title>
    <link rel="stylesheet" href="caffer.css">
</head>
<body>
    <header>
        <h1 class="lol">CAFE LUNA ☕</h1>
        <nav>
            <a href="">INICO</a>
            <a href="#MENU">MENU</a>
            <a href="">CONTACTO</a>
        </nav>
        </header>

        <section class="ok">
            <h2>El sabor de cada mañana</h2>
            <button>MENU</button>

            <h2 id="MENU">Nuestros favoritos</h2>
            <div class="contenedor">

                <h3>Espresso</h3>
                <p>intenso y romantico</p>
                <span>$1.50</span>
            </div>
            <div class="card">
                <h3>Capichino</h3>
                <p>Perfecto en la mañana</p>
                <span>$2.0</span>
            </div>
            <div class="card">
                <h3>Latte</h3>
                <span>$3.00</span>
            </div>
            </div>
        </section>
        <h2 class="eu">Contactanos</h2>
        <form>
        <di class="form_input">
            <label>Nombre completo</label>
            <input type="text" placeholder="">
        </di>
        <div class="form_input">
            <label>Correo</label>
            <input type="email" placeholder="">
        </div>
        
        <div class="form_input">
            <label>Mensaje</label>
            <textarea rows="8" placeholder="Deja tu mensaje.."></textarea>
        </div>
        <button>ENVIAR</button>
        </form>
    <footer>
            Avenida Principal 45 
            Instagram: @CafeLuna
    </footer>
    </fieldset>
